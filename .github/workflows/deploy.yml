name: Build & Deploy

# Manual trigger only until docs.sifa.id DNS + VPS secrets (VPS_HOST,
# VPS_USER, VPS_SSH_KEY) are configured. Flip to `push: branches: [main]`
# once the deploy target is live.
on:
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm lint

      - name: Deploy to VPS
        uses: burnett01/rsync-deployments@7.0.2
        with:
          switches: -avz --delete
          path: out/
          remote_path: /var/www/docs.sifa.id/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}
