name: Link check

# Walks the built static export and verifies every link resolves.
# Internal links (rooted with /) must point at a file under out/.
# External links must return a non-error HTTP status.
#
# Triggers:
# - on PRs that touch content, components, or app routing.
# - on a weekly schedule (Mondays 04:00 UTC) to catch external rot.
# - manually via workflow_dispatch.
#
# The schedule catches the common case of an external project moving,
# renaming, or shutting down between PR runs.

on:
  pull_request:
    branches: [main]
    paths:
      - 'content/**'
      - 'app/**'
      - 'components/**'
      - 'public/**'
      - '.lychee.toml'
      - '.github/workflows/link-check.yml'
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write # for the scheduled-run failure-issue step

concurrency:
  group: link-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      # Restore lychee's cache between runs. Cache key includes the
      # lockfile so a config change invalidates everything.
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .lycheecache
          key: lychee-${{ hashFiles('.lychee.toml') }}-${{ github.run_id }}
          restore-keys: |
            lychee-${{ hashFiles('.lychee.toml') }}-

      - name: Run lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          # Walk the built static export. lychee picks up HTML, MDX is
          # already rendered into HTML by next build.
          args: --config .lychee.toml --root-dir "$(pwd)/out" ./out
          # Fail the job on any broken link.
          fail: true
          # Output goes to GitHub Actions step summary.
          output: ./lychee/out.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Append summary to PR
        if: failure() && github.event_name == 'pull_request'
        run: |
          {
            echo '## Broken links'
            echo ''
            cat ./lychee/out.md
          } >> "$GITHUB_STEP_SUMMARY"

      # On the scheduled run, file an issue instead of just failing
      # silently. Otherwise broken external links sit in a red workflow
      # nobody looks at.
      - name: File issue on scheduled-run failure
        if: failure() && github.event_name == 'schedule'
        uses: peter-evans/create-issue-from-file@e8ef132d6df98ed982188e460ebb3b5d4ef3a9cd # v5.0.1
        with:
          title: 'Broken links found in scheduled link-check'
          content-filepath: ./lychee/out.md
          labels: docs, link-rot, automated
